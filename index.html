<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Facial CARVO</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.1/dist/face-api.js"></script>
<style>
  :root{--bg:#0C0C0C;--green:#1E6B60;--off:#F2EFE9;--green-soft:rgba(30,107,96,.15);--line:rgba(242,239,233,.12);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--off);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px;display:flex;flex-direction:column;align-items:center}
  h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;margin-bottom:4px}
  .sub{font-size:13px;opacity:.55;margin-bottom:24px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;background:rgba(242,239,233,.05);padding:5px;border-radius:12px}
  .tab{padding:10px 22px;border:none;background:transparent;color:var(--off);font-family:'Manrope';font-weight:700;font-size:14px;border-radius:8px;cursor:pointer;opacity:.55;transition:.2s}
  .tab.ativo{background:var(--green);opacity:1}
  .palco{position:relative;width:420px;max-width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  canvas{z-index:2}
  .painel{width:420px;max-width:100%;margin-top:18px;display:flex;flex-direction:column;gap:12px}
  .linha{display:flex;gap:10px}
  input{flex:1;padding:13px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(242,239,233,.04);color:var(--off);font-family:'DM Sans';font-size:15px}
  input:focus{outline:none;border-color:var(--green)}
  button.acao{padding:13px 20px;border:none;border-radius:10px;background:var(--green);color:var(--off);font-family:'Manrope';font-weight:700;font-size:14px;cursor:pointer;transition:.2s}
  button.acao:hover{filter:brightness(1.15)}
  button.acao:disabled{opacity:.35;cursor:not-allowed}
  .status{font-size:13px;text-align:center;min-height:20px;padding:10px;border-radius:10px;background:var(--green-soft);font-weight:500}
  .grupo{display:none}.grupo.ativo{display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>
  <h1>Login Facial CARVO</h1>
  <div class="sub">Olhe para a camera para entrar</div>

  <div class="tabs">
    <button class="tab ativo" id="tabLogin" onclick="trocar('login')">Entrar</button>
    <button class="tab" id="tabCad" onclick="trocar('cad')">Cadastrar</button>
  </div>

  <div class="palco">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="painel">
    <div class="status" id="status">Carregando modelos de IA...</div>
    <div class="grupo ativo" id="grupoLogin">
      <button class="acao" id="btnLogin" disabled onclick="alternarScan()">Procurar meu rosto</button>
    </div>
    <div class="grupo" id="grupoCad">
      <div class="linha">
        <input id="nome" placeholder="Nome da pessoa" />
        <button class="acao" id="btnCad" disabled onclick="cadastrar()">Capturar rosto</button>
      </div>
      <div style="font-size:12px;opacity:.5;line-height:1.5">Cadastre cada pessoa 3 a 4 vezes, com angulos e luz diferentes.</div>
    </div>
  </div>

<script>
/* ====== CONFIG ====== */
var URL_API   = 'https://script.google.com/macros/s/AKfycbyblXQW3FWpG05-th-8WiaoNJNu6wag5ljbamASTr449elzH1x9Xg_vxySyOlrNOHZo/exec';
var MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.1/model';
var LIMIAR = 0.5;
var INTERVALO_MS = 600;

var video=document.getElementById('video'), overlay=document.getElementById('overlay'), statusEl=document.getElementById('status');
var scanAtivo=false, scanId=null, entrando=false;

/* ====== API ====== */
function apiPost(payload){
  return fetch(URL_API, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) })
    .then(function(r){ return r.json(); });
}

/* ====== BOOT ====== */
(async function init(){
  try{
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
    await iniciarCamera();
    document.getElementById('btnLogin').disabled=false;
    document.getElementById('btnCad').disabled=false;
    setStatus('Pronto. Clique em "Procurar meu rosto".');
  }catch(e){ tratarErroInit(e); }
})();

function tratarErroInit(e){
  var n = e && e.name ? e.name : '';
  if(n==='NotAllowedError')      setStatus('Camera bloqueada. Permita o acesso e recarregue.');
  else if(n==='NotFoundError')   setStatus('Nenhuma camera encontrada.');
  else if(n==='NotReadableError')setStatus('Camera em uso por outro app.');
  else if(typeof navigator==='undefined'||!navigator.mediaDevices) setStatus('Pagina precisa estar em HTTPS.');
  else setStatus('Erro ao iniciar: '+(e.message||e));
}

async function iniciarCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) throw new Error('getUserMedia indisponivel (HTTPS).');
  var stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' } });
  video.srcObject = stream;
  return new Promise(function(res){ video.onloadedmetadata=function(){ overlay.width=video.videoWidth; overlay.height=video.videoHeight; res(); }; });
}

async function detectarRosto(){
  var opt = new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:0.5 });
  return await faceapi.detectSingleFace(video, opt).withFaceLandmarks().withFaceDescriptor();
}

/* ====== LOGIN (scan continuo ate reconhecer) ====== */
function alternarScan(){
  scanAtivo=!scanAtivo;
  document.getElementById('btnLogin').textContent = scanAtivo ? 'Parar' : 'Procurar meu rosto';
  if(scanAtivo){ setStatus('Procurando seu rosto...'); loopScan(); }
  else { clearTimeout(scanId); limparOverlay(); setStatus('Pronto.'); }
}

async function loopScan(){
  if(!scanAtivo || entrando) return;
  var det = await detectarRosto();
  if(det){
    desenharCaixa(det,'#1E6B60','analisando...');
    entrando=true;
    try{
      var r = await apiPost({ action:'login', descritor:Array.from(det.descriptor) });
      if(r.ok){
        desenharCaixa(det,'#4ade80', r.nome);
        setStatus('Bem-vindo, '+r.nome+'. Entrando...');
        scanAtivo=false;
        window.location.href = URL_API + '?page=painel&token=' + encodeURIComponent(r.token);
        return;
      } else {
        desenharCaixa(det,'#f87171','nao reconhecido');
        setStatus('Rosto nao reconhecido. Tentando de novo...');
      }
    }catch(err){ setStatus('Erro de conexao: '+err); }
    entrando=false;
  } else {
    limparOverlay(); setStatus('Aproxime o rosto da camera...');
  }
  scanId=setTimeout(loopScan, INTERVALO_MS);
}

/* ====== CADASTRAR ====== */
async function cadastrar(){
  var nome = document.getElementById('nome').value.trim();
  if(!nome){ setStatus('Digite o nome antes.'); return; }
  setStatus('Capturando...');
  var det = await detectarRosto();
  if(!det){ setStatus('Nenhum rosto detectado. Aproxime-se.'); return; }
  try{
    var r = await apiPost({ action:'salvarRosto', nome:nome, descritor:Array.from(det.descriptor) });
    if(r.ok){ setStatus('Cadastrado: '+r.nome+'. Capture de novo mudando o angulo.'); document.getElementById('nome').value=nome; }
    else setStatus('Falha: '+r.erro);
  }catch(err){ setStatus('Erro: '+err); }
}

/* ====== DESENHO / UI ====== */
function desenharCaixa(det,cor,texto){
  var ctx=overlay.getContext('2d'); ctx.clearRect(0,0,overlay.width,overlay.height);
  var b=det.detection.box; ctx.strokeStyle=cor; ctx.lineWidth=3; ctx.strokeRect(b.x,b.y,b.width,b.height);
  ctx.fillStyle=cor; ctx.font='16px Manrope, sans-serif'; ctx.fillText(texto,b.x,b.y-8);
}
function limparOverlay(){ overlay.getContext('2d').clearRect(0,0,overlay.width,overlay.height); }
function trocar(modo){
  var l=modo==='login';
  document.getElementById('tabLogin').classList.toggle('ativo',l);
  document.getElementById('tabCad').classList.toggle('ativo',!l);
  document.getElementById('grupoLogin').classList.toggle('ativo',l);
  document.getElementById('grupoCad').classList.toggle('ativo',!l);
  if(!l && scanAtivo) alternarScan();
}
function setStatus(t){ statusEl.textContent=t; }
</script>
</body>
</html>
