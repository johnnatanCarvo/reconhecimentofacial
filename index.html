<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reconhecimento Facial CARVO</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.1/dist/face-api.js"></script>
<style>
  :root{--bg:#0C0C0C;--green:#1E6B60;--off:#F2EFE9;--green-soft:rgba(30,107,96,.15);--line:rgba(242,239,233,.12);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--off);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px;display:flex;flex-direction:column;align-items:center}
  h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;margin-bottom:4px}
  .sub{font-size:13px;opacity:.55;margin-bottom:24px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;background:rgba(242,239,233,.05);padding:5px;border-radius:12px}
  .tab{padding:10px 22px;border:none;background:transparent;color:var(--off);font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;border-radius:8px;cursor:pointer;opacity:.55;transition:.2s}
  .tab.ativo{background:var(--green);opacity:1}
  .palco{position:relative;width:480px;max-width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  canvas{z-index:2}
  .painel{width:480px;max-width:100%;margin-top:18px;display:flex;flex-direction:column;gap:12px}
  .linha{display:flex;gap:10px}
  input{flex:1;padding:13px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(242,239,233,.04);color:var(--off);font-family:'DM Sans';font-size:15px}
  input:focus{outline:none;border-color:var(--green)}
  button.acao{padding:13px 20px;border:none;border-radius:10px;background:var(--green);color:var(--off);font-family:'Manrope';font-weight:700;font-size:14px;cursor:pointer;transition:.2s}
  button.acao:hover{filter:brightness(1.15)}
  button.acao:disabled{opacity:.35;cursor:not-allowed}
  .status{font-size:13px;text-align:center;min-height:20px;padding:10px;border-radius:10px;background:var(--green-soft);font-weight:500}
  .resultado{font-family:'Manrope';font-weight:800;font-size:28px;text-align:center;padding:16px;border-radius:12px;border:1px solid var(--line);min-height:64px;display:flex;flex-direction:column;justify-content:center}
  .conf{font-family:'DM Sans';font-weight:400;font-size:13px;opacity:.6;margin-top:4px}
  .ok{color:#4ade80}.no{color:#f87171}
  .grupo{display:none}.grupo.ativo{display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>
  <h1>Reconhecimento Facial CARVO</h1>
  <div class="sub">Processamento no navegador. Backend: Apps Script (API JSON)</div>

  <div class="tabs">
    <button class="tab ativo" id="tabRec" onclick="trocar('rec')">Reconhecer</button>
    <button class="tab" id="tabCad" onclick="trocar('cad')">Cadastrar</button>
  </div>

  <div class="palco">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="painel">
    <div class="status" id="status">Carregando modelos de IA...</div>
    <div class="grupo ativo" id="grupoRec">
      <div class="resultado" id="resultado">Aguardando...</div>
      <button class="acao" id="btnRec" disabled onclick="alternarReconhecimento()">Iniciar reconhecimento</button>
    </div>
    <div class="grupo" id="grupoCad">
      <div class="linha">
        <input id="nome" placeholder="Nome da pessoa" />
        <button class="acao" id="btnCad" disabled onclick="cadastrar()">Capturar rosto</button>
      </div>
      <div style="font-size:12px;opacity:.5;line-height:1.5">Cadastre a mesma pessoa 3 a 4 vezes, com angulos e luz diferentes. Mais amostras = menos erro.</div>
    </div>
  </div>

<script>
/* ====== CONFIG ====== */
var URL_API   = '1aUw0JyHxUY5Umrvfv0rSA1v4qbz32JxdVw_5f8xcd04'; // ex: https://script.google.com/macros/s/XXXX/exec
var MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.1/model';
var LIMIAR = 0.5;       // distancia maxima p/ match (menor = mais rigido)
var INTERVALO_MS = 700;

/* ====== ESTADO ====== */
var video=document.getElementById('video'), overlay=document.getElementById('overlay'), statusEl=document.getElementById('status');
var matcher=null, loopAtivo=false, loopId=null, ultimoLog='';

/* ====== CLIENTE DA API (fetch, CORS-safe) ====== */
function apiGet(action){
  return fetch(URL_API + '?action=' + encodeURIComponent(action)).then(function(r){ return r.json(); });
}
function apiPost(payload){
  // text/plain evita o preflight OPTIONS que o Apps Script nao responde
  return fetch(URL_API, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); });
}

/* ====== BOOT ====== */
(async function init(){
  try{
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
    await iniciarCamera();
    await carregarRostos();
    document.getElementById('btnRec').disabled=false;
    document.getElementById('btnCad').disabled=false;
    setStatus('Pronto. ' + (matcher ? 'Banco de rostos carregado.' : 'Nenhum rosto cadastrado ainda.'));
  }catch(e){ tratarErroInit(e); }
})();

function tratarErroInit(e){
  var nome = e && e.name ? e.name : '';
  if(nome === 'NotAllowedError')      setStatus('Camera bloqueada. Permita o acesso no navegador (cadeado da barra) e recarregue.');
  else if(nome === 'NotFoundError')   setStatus('Nenhuma camera encontrada no dispositivo.');
  else if(nome === 'NotReadableError')setStatus('Camera em uso por outro app. Feche e tente de novo.');
  else if(typeof navigator==='undefined' || !navigator.mediaDevices) setStatus('Sem contexto seguro. A pagina precisa estar em HTTPS.');
  else setStatus('Erro ao iniciar: ' + (e.message || e));
}

async function iniciarCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    throw new Error('getUserMedia indisponivel (pagina precisa estar em HTTPS).');
  }
  var stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' } });
  video.srcObject = stream;
  return new Promise(function(res){ video.onloadedmetadata=function(){ overlay.width=video.videoWidth; overlay.height=video.videoHeight; res(); }; });
}

async function carregarRostos(){
  try{
    var rostos = await apiGet('getRostos');
    if(rostos && rostos.length){
      var labeled = rostos.map(function(r){
        return new faceapi.LabeledFaceDescriptors(r.label, r.descritores.map(function(d){ return new Float32Array(d); }));
      });
      matcher = new faceapi.FaceMatcher(labeled, LIMIAR);
    }
  }catch(err){ setStatus('Erro ao carregar banco: ' + err); }
}

async function detectarRosto(){
  var opt = new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:0.5 });
  return await faceapi.detectSingleFace(video, opt).withFaceLandmarks().withFaceDescriptor();
}

/* ====== CADASTRAR ====== */
async function cadastrar(){
  var nome = document.getElementById('nome').value.trim();
  if(!nome){ setStatus('Digite o nome antes.'); return; }
  setStatus('Capturando...');
  var det = await detectarRosto();
  if(!det){ setStatus('Nenhum rosto detectado. Aproxime-se.'); return; }
  try{
    var r = await apiPost({ action:'salvarRosto', nome:nome, descritor:Array.from(det.descriptor) });
    if(r.ok){ setStatus('Cadastrado: '+r.nome+'. Recarregando banco...'); document.getElementById('nome').value=''; await carregarRostos(); }
    else setStatus('Falha: '+r.erro);
  }catch(err){ setStatus('Erro: '+err); }
}

/* ====== RECONHECER ====== */
function alternarReconhecimento(){
  loopAtivo=!loopAtivo;
  document.getElementById('btnRec').textContent = loopAtivo ? 'Parar' : 'Iniciar reconhecimento';
  if(loopAtivo) loopReconhecer(); else { clearTimeout(loopId); limparOverlay(); }
}
async function loopReconhecer(){
  if(!loopAtivo) return;
  var det = await detectarRosto(), res = document.getElementById('resultado');
  if(!det){ res.innerHTML='Nenhum rosto'; res.className='resultado'; limparOverlay(); }
  else if(!matcher){ res.innerHTML='Sem cadastros<div class="conf">Cadastre rostos primeiro</div>'; res.className='resultado'; desenharCaixa(det,'#1E6B60','rosto detectado'); }
  else {
    var m = matcher.findBestMatch(det.descriptor);
    if(m.label==='unknown'){ res.innerHTML='<span class="no">Desconhecido</span>'; res.className='resultado'; desenharCaixa(det,'#f87171','desconhecido'); }
    else {
      var conf = Math.max(0, Math.round((1-m.distance)*100));
      res.innerHTML='<span class="ok">'+m.label+'</span><div class="conf">confianca '+conf+'% (dist '+m.distance.toFixed(2)+')</div>';
      res.className='resultado'; desenharCaixa(det,'#4ade80',m.label+' '+conf+'%');
      if(ultimoLog!==m.label){ ultimoLog=m.label; apiPost({ action:'registrarLog', nome:m.label, distancia:m.distance }).catch(function(){}); }
    }
  }
  loopId=setTimeout(loopReconhecer, INTERVALO_MS);
}

/* ====== DESENHO / UI ====== */
function desenharCaixa(det,cor,texto){
  var ctx=overlay.getContext('2d'); ctx.clearRect(0,0,overlay.width,overlay.height);
  var b=det.detection.box; ctx.strokeStyle=cor; ctx.lineWidth=3; ctx.strokeRect(b.x,b.y,b.width,b.height);
  ctx.fillStyle=cor; ctx.font='16px Manrope, sans-serif'; ctx.fillText(texto,b.x,b.y-8);
}
function limparOverlay(){ overlay.getContext('2d').clearRect(0,0,overlay.width,overlay.height); }
function trocar(modo){
  var r=modo==='rec';
  document.getElementById('tabRec').classList.toggle('ativo',r);
  document.getElementById('tabCad').classList.toggle('ativo',!r);
  document.getElementById('grupoRec').classList.toggle('ativo',r);
  document.getElementById('grupoCad').classList.toggle('ativo',!r);
  if(!r && loopAtivo) alternarReconhecimento();
}
function setStatus(t){ statusEl.textContent=t; }
</script>
</body>
</html>
